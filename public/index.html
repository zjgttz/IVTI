<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6c8d71">
  <meta name="description" content="IVTI · 6 个维度、12 道题，测出你的人格类型">
  <title>IVTI · 你是哪一型</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="app">

    <!-- 介绍屏 -->
    <section id="screen-intro" class="screen">
      <div class="card">
        <h1 class="title">IVTI</h1>
        <p class="subtitle">12 道题，测出你的人格类型</p>
        <p class="lede">基于 6 个维度的向量匹配，给你一个不那么严肃的自我画像。全部计算在本地完成，仅匿名上报人格类型用于统计。</p>
        <button class="btn btn-primary" id="btn-start">开始测试</button>
      </div>
    </section>

    <!-- 答题屏 -->
    <section id="screen-quiz" class="screen hidden">
      <div class="progress">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="quiz-body">
        <p class="quiz-index" id="quiz-index">1 / 12</p>
        <h2 class="quiz-question" id="quiz-question"></h2>
        <div class="options" id="quiz-options"></div>
        <button class="btn btn-text" id="btn-back">← 上一题</button>
      </div>
    </section>

    <!-- 结果屏 -->
    <section id="screen-result" class="screen hidden">
      <div class="result-card" id="result-card">
        <div class="result-header" id="result-header">
          <p class="result-code" id="result-code"></p>
          <h2 class="result-name" id="result-name"></h2>
          <p class="result-match"><span id="result-match">0</span>% 匹配</p>
        </div>
        <p class="result-desc" id="result-desc"></p>
        <div class="dims" id="dims"></div>
        <p class="result-brand">IVTI · 你是哪一型</p>
      </div>
      <div class="result-actions">
        <button class="btn btn-primary" id="btn-poster">生成海报</button>
        <button class="btn btn-ghost" id="btn-restart">再测一次</button>
      </div>
    </section>

  </main>

  <script src="/js/data.js"></script>
  <script src="/js/scoring.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
